excerpt_139_words: "Compilers, interpreters, and execution models explain how programming languages become running computation. A program written by a human is not automatically executable in the form it first appears. It may be parsed, checked, transformed, optimized, compiled, interpreted, assembled, linked, loaded, translated into bytecode, executed by a virtual machine, scheduled by a runtime, or compiled just in time while running. Execution is not a single idea. It is a chain of representations and processes that connect source code to machine behavior. This article explains compilers, interpreters, and execution models as tools for computational reasoning. They determine how programs are analyzed, transformed, checked, optimized, debugged, secured, distributed, and executed across machines, operating systems, runtimes, browsers, servers, scientific workflows, embedded systems, and institutional software infrastructure."
