excerpt_139_words: "Compression, encoding, and information efficiency give computation a way to store, transmit, compare, and reason with information more compactly. Data rarely moves through computational systems in its rawest possible form. It is encoded into symbols, bytes, records, packets, files, tokens, vectors, indexes, archives, streams, and formats. It may also be compressed so that repeated structure, redundancy, or predictable patterns take less space. Encoding gives information a usable form. Compression reduces the cost of representing it. Information efficiency asks how much structure can be preserved, how much can be removed, and what is lost or hidden in the process. These ideas support file formats, communication networks, databases, search engines, archives, image systems, audio systems, video systems, model inputs, web platforms, storage systems, APIs, scientific computing, AI pipelines, and information governance."
