excerpt_139_words: "Query algorithms determine how a database answers questions. Database optimization determines how those questions are answered efficiently, reliably, and at scale. Together, they connect the logic of a query to the physical work required to execute it. A user may write a query as if it were a simple request: find matching records, join tables, group results, sort output, or return top rows. But the database engine must translate that request into an execution strategy. It may scan a table, use an index, reorder joins, estimate cardinality, choose a hash join or nested loop join, materialize intermediate results, push filters downward, use statistics, parallelize execution, cache results, or rewrite the query internally. Query optimization links formal questions, computational cost, performance evidence, and responsible database design."
