excerpt_139_words: "Streaming algorithms study how to process data that arrives continuously, too quickly, or too largely to store in full. Instead of waiting for a complete dataset, a streaming algorithm reads items as they arrive and maintains a compact state: a counter, sketch, sample, window, estimate, alert, index, or summary. This makes streaming algorithms essential for real-time systems. Clicks, transactions, sensor readings, network packets, logs, messages, location updates, model outputs, alerts, and infrastructure events do not always arrive as neat datasets. They arrive as flows. A system may need to estimate frequency, detect anomalies, count distinct users, track heavy hitters, update dashboards, trigger alerts, summarize behavior, or route events while memory remains limited and time keeps moving."
