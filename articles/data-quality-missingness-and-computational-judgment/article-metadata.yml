excerpt_139_words: "Data quality determines what computational systems can responsibly claim. Missingness determines what those systems cannot see. Computational judgment begins when designers, analysts, researchers, engineers, and decision-makers recognize that data is never simply given. It is collected, selected, formatted, transformed, omitted, corrected, inferred, validated, and interpreted. A dataset may look complete because every row has values. It may still be incomplete because certain people, places, events, sources, time periods, categories, or conditions were never recorded. A dashboard may look precise because it contains numbers. Those numbers may depend on fragile definitions, inconsistent measurement, silent imputation, duplicated entities, stale records, missing metadata, or excluded cases. Data quality and missingness shape what algorithms can learn, retrieve, model, cite, and responsibly decide."
