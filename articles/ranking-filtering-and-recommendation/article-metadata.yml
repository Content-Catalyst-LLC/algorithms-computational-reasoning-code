excerpt_139_words: "Ranking, filtering, and recommendation explain how computational systems decide what to show, hide, prioritize, suppress, retrieve, sort, suggest, or promote. Once information becomes abundant, algorithms are used not only to find possible items, but to order them according to relevance, quality, similarity, authority, preference, popularity, predicted usefulness, institutional policy, or commercial value. Ranking turns candidates into an ordered list. Filtering removes candidates that do not meet rules or thresholds. Recommendation suggests items, people, documents, products, courses, videos, routes, actions, or decisions based on signals, relationships, behavior, metadata, content, context, or predicted fit. Responsible systems document candidate sources, filters, signals, scores, personalization, diversity goals, feedback loops, exposure effects, fairness review, traceability, governance, and representation risk so visibility remains explainable, contestable, accountable, and aligned with purpose."
