excerpt_139_words: "Ranking signals and relevance models determine how search systems decide which results should appear first. They transform a set of candidate documents into an ordered list that shapes what users see, trust, cite, ignore, and act upon. A retrieval system may find thousands of possible matches for a query. Ranking determines which few appear at the top. That ranking may depend on term overlap, field weights, phrase proximity, document length, recency, popularity, authority, metadata completeness, source quality, user context, click behavior, semantic similarity, freshness, permissions, and domain-specific priorities. A relevance model combines these signals into a score, probability, order, or decision rule. Ranking organizes attention, affects discovery, and requires governance because a highly ranked source can appear authoritative even when its position depends on fragile assumptions."
