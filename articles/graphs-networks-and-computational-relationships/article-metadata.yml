excerpt_139_words: "Graphs, networks, and computational relationships give algorithms a way to reason about connection. They represent entities as nodes and relationships as edges. A road map connects locations. A citation network connects documents. A dependency graph connects tasks. A social network connects people, accounts, institutions, or organizations. A knowledge graph connects concepts. A system model connects components, flows, constraints, risks, and feedback. Graphs are powerful because many problems are not linear, hierarchical, or table-shaped. They are relational. The important question is not only what this item is, but what it connects to, how influence moves, what depends on what, what path connects points, where bottlenecks appear, which nodes are central, and what happens when one connection fails. This article explains graphs as computational thinking tools for relationships, paths, networks, dependencies, flows, communities, influence, resilience, search, optimization, and governance."
