excerpt_139_words: "Iteration, recursion, and control flow explain how algorithms move through time. An algorithm is not only a set of operations. It is an ordered process: it repeats, branches, calls subproblems, updates state, checks conditions, stops, and sometimes delegates work to other procedures. Control flow is the structure that determines what happens next. Iteration repeats a block of computation while a condition, collection, counter, queue, or stream remains active. Recursion solves a problem by reducing it to smaller instances of the same problem. Together, these ideas form the procedural grammar of computation. Good algorithmic reasoning requires knowing when to loop, when to recurse, when to branch, when to stop, and how to prove that the procedure is correct across ordinary, edge, error, and high-stakes cases."
