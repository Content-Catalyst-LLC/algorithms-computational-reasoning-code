excerpt_139_words: "Approximation algorithms are designed for problems where exact optimal solutions are too expensive to compute at useful scale. Instead of pretending that every problem can be solved perfectly and quickly, approximation algorithms ask a more practical question: can we find a solution that is provably close to optimal within acceptable time? This makes approximation central to practical solvability. Some problems are easy to state but computationally difficult to solve exactly. Scheduling, routing, allocation, facility location, graph problems, clustering, covering, packing, and network design often produce enormous search spaces. An exact solution may exist in principle but be unusable in practice. Approximation algorithms respond by trading exactness for guarantees. They may promise a solution within a factor of the optimum, within an additive error, or within a tunable accuracy-cost trade-off."
