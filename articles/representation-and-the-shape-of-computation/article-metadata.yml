excerpt_139_words: "Representation is one of the hidden foundations of computation. Before an algorithm can search, compare, rank, classify, retrieve, transform, optimize, or reason, something must be represented in a form the algorithm can work with. The representation determines what the system can see, what it can ignore, what it can store, what it can count, what it can compare, and what operations become easy or difficult. A problem represented as a list invites one set of procedures. A problem represented as a graph invites another. Tables, trees, vectors, schemas, indexes, documents, embeddings, and state spaces each shape computation differently. This article explains representation as a central act of computational reasoning, connecting symbolic structure, data structures, schemas, encodings, metadata, provenance, compression, information loss, traceability, interpretation, and governance."
