excerpt_139_words: "Online algorithms study decisions that must be made as inputs arrive over time. Unlike offline algorithms, which can inspect the full input before choosing a solution, online algorithms act without knowing the future. They must commit, update, reject, accept, allocate, route, schedule, cache, or prioritize under partial information. This makes online algorithms central to real systems. Requests arrive before future requests are known. Jobs enter queues before the day’s full workload is visible. Packets move through networks before traffic patterns are complete. Ads are auctioned, inventory is allocated, rides are matched, fraud alerts are triaged, recommendations are served, and emergency resources are assigned before all relevant information has arrived. Online reasoning clarifies uncertainty, commitment, thresholds, queue pressure, fairness, fallback, and responsible decisions under arrival."
