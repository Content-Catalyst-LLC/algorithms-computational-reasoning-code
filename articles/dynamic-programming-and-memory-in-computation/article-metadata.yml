excerpt_139_words: "Dynamic programming is a method for solving problems by remembering the results of subproblems. Instead of recomputing the same work again and again, a dynamic programming algorithm stores useful partial results and reuses them. This makes memory a central part of the computation. Where greedy algorithms commit to a local choice, dynamic programming compares possibilities across subproblems. It is especially powerful when a problem has overlapping subproblems and optimal substructure: the same smaller problems appear repeatedly, and the best solution to the whole can be built from the best solutions to its parts. Dynamic programming appears in optimization, sequence alignment, edit distance, routing, scheduling, resource allocation, reinforcement learning, inventory planning, text processing, computational biology, economics, operations research, and AI systems."
