excerpt_139_words: "Greedy algorithms and local decision rules solve problems by making the best available choice at each step. Instead of exploring every possible future or solving every subproblem before acting, a greedy method commits to a local choice and moves forward. This makes greedy algorithms attractive: they are often simple, fast, interpretable, and easy to implement. But greedy reasoning is also risky. A choice that looks best locally may not produce the best global result. Greedy algorithms work when the structure of the problem guarantees that locally optimal choices can be safely combined into a globally acceptable or optimal solution. Without that structure, greediness can produce fast but fragile decisions. Greedy methods appear in scheduling, routing, compression, graph algorithms, resource allocation, search heuristics, public queues, recommender systems, triage workflows, and everyday decision support."
