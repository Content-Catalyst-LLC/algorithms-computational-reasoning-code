excerpt_139_words: "Evolutionary algorithms are adaptive search methods inspired by variation, selection, recombination, mutation, and population-level learning. Instead of searching from a single candidate solution, they maintain a population of possible solutions, evaluate them with a fitness function, preserve or recombine stronger candidates, introduce variation, and iterate across generations. These methods are useful when solution spaces are large, rugged, nonlinear, poorly understood, or difficult to optimize with exact algorithms. They appear in design optimization, scheduling, routing, engineering, symbolic regression, machine learning, feature selection, artificial life, simulation, game strategy, parameter tuning, architecture search, and adaptive systems modeling. Evolutionary algorithms do not usually guarantee global optimality. Their strength is flexible exploration. Their risk is that they can become opaque, overfit to a fitness function, converge prematurely, or produce solutions that look impressive without being robust."
