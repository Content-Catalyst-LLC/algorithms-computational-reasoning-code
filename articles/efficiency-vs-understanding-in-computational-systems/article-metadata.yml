excerpt_139_words: "Efficiency is one of the great achievements of computational systems. Efficient algorithms reduce time, memory, cost, energy, latency, and operational burden. They make search possible, simulation feasible, infrastructure scalable, and real-time systems responsive. Without efficiency, many computational systems would remain theoretical or unusable. But efficiency can also create a problem. A system may become faster while becoming harder to understand. It may become more compressed, automated, optimized, distributed, or abstract while becoming less interpretable, less auditable, less explainable, and less accountable. The system works, but fewer people can say why it works, where it fails, what it hides, or what assumptions it depends on. Responsible computational reasoning evaluates performance gains alongside interpretability, provenance, maintainability, governance, and the ability to challenge or correct system behavior."
