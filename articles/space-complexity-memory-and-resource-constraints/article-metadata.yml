excerpt_139_words: "Space complexity asks how much memory an algorithm requires as input size grows. Time complexity tells us how long a computation may take. Space complexity tells us how much must be stored, remembered, buffered, indexed, cached, copied, transmitted, or retained while computation is happening. Memory is not a secondary concern. Many systems fail not because they perform too many operations, but because they require too much space. A model may be fast enough but too large to fit in memory. A graph algorithm may be theoretically efficient but impossible to run on a dense network. A recursive method may be elegant but overflow the call stack. Space complexity connects algorithm design to infrastructure, cost, energy, latency, reliability, governance, access, and responsible communication of computational limits."
