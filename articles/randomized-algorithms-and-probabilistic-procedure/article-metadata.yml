excerpt_139_words: "Randomized algorithms use chance as part of computation. Instead of following only fixed deterministic steps, they make random choices, sample from large spaces, shuffle inputs, select pivots, test candidates probabilistically, estimate quantities, or trade certainty for speed. Randomness can make algorithms simpler, faster, more robust, or more scalable. But probabilistic procedure also changes the meaning of correctness. Some randomized algorithms always return a correct answer but have variable running time. Others run quickly but may return an incorrect answer with small probability. Some estimate rather than decide. Some use sampling to make large problems manageable. Randomized methods appear in sorting, primality testing, hashing, load balancing, randomized search, Monte Carlo simulation, streaming algorithms, approximation, machine learning, cryptography, distributed systems, uncertainty analysis, and decision support."
