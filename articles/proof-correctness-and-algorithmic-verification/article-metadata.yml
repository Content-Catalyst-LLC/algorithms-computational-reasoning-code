excerpt_139_words: "Proof, correctness, and algorithmic verification ask how we know that an algorithm does what it is supposed to do. A program may run, produce output, and pass several tests while still failing for untested inputs, edge cases, invalid states, or unstated assumptions. Correctness is not simply whether code works. It is a relationship among problem, specification, procedure, implementation, and intended use. This article explains specifications, preconditions, postconditions, invariants, partial correctness, total correctness, termination, tests, proof sketches, counterexamples, static analysis, type systems, model checking, formal verification, and machine-checked reasoning. It also emphasizes that verification depends on context. A procedure can be correct under stated assumptions and still be inappropriate, incomplete, misleading, or unsafe if its specification, data, goals, or deployment context are wrong."
