excerpt_139_words: "Backtracking, branch and bound, and exhaustive search are algorithmic strategies for exploring spaces of possible solutions. Where greedy algorithms commit quickly and dynamic programming remembers subproblem results, search-based methods systematically examine alternatives. They are used when the answer cannot be found by a simple local rule, when possibilities must be tested against constraints, or when optimality requires comparing many candidate solutions. Exhaustive search considers every relevant possibility. Backtracking explores possibilities step by step and abandons partial solutions that cannot succeed. Branch and bound adds optimization discipline by pruning branches whose best possible outcome cannot improve the current best solution. These methods appear in puzzles, scheduling, constraint satisfaction, routing, combinatorial optimization, verification, model checking, planning, resource allocation, operations research, AI reasoning, and institutional decision support."
