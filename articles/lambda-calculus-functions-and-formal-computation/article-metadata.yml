excerpt_139_words: "Lambda calculus is one of the foundational languages of formal computation. It shows that computation can be understood through functions, variables, abstraction, application, and substitution. A function can be defined, applied to an argument, and reduced by substituting that argument into the function body. From this small set of ideas, lambda calculus helps explain programming languages, recursion, higher-order functions, evaluation strategies, type systems, logic, proof, and the relationship between functions and formal reasoning. This article introduces variables, abstraction, application, free and bound variables, substitution, alpha conversion, beta reduction, eta conversion, normal forms, evaluation strategies, recursion, fixed points, Church encodings, typed lambda calculus, functional programming, proof systems, type theory, and formal verification. It shows why lambda calculus remains a living foundation for programming-language design, symbolic computation, proof assistants, and computational reasoning."
