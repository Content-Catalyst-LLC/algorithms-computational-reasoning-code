excerpt_139_words: "Big-O notation is the language computer scientists use to describe how algorithmic cost grows as input size grows. It does not usually tell us the exact number of seconds an algorithm will take. Instead, it describes the dominant growth pattern: constant, logarithmic, linear, linearithmic, quadratic, cubic, exponential, factorial, or something else. Growth rates matter because scale changes computation. Two algorithms may look similar on ten inputs and behave completely differently on ten million. A method that is elegant on a small example may become unusable at production scale. A procedure that seems inefficient for tiny data may become preferable once inputs grow large enough. Big-O is therefore not only a notation system. It is a way of thinking about limits, feasibility, scalability, resource growth, practical solvability, and design trade-offs."
