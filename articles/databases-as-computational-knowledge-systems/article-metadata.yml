excerpt_139_words: "Databases are often described as places where information is stored. That description is accurate but incomplete. A database is not only a container. It is a computational knowledge system: a structured environment where data is represented, constrained, queried, indexed, related, updated, governed, and interpreted. A spreadsheet may hold entries. A file may hold text. A database defines relationships among records, rules for valid data, methods for retrieval, permissions for access, histories of change, indexes for search, views for interpretation, and transactions for reliability. It turns scattered facts into organized computational knowledge. Modern institutions do not merely use databases to remember things. They use databases to decide things. Database design shapes representation, retrieval, inference, accountability, provenance, institutional memory, and responsible computational judgment."
